# Environment variables
# Follow portainer/.env.example for defaults and Cloudflare DNS challenge settings.

services:
  traefik:
    image: traefik:v3.6.13
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # HTTP → HTTPS redirect
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

      # Trust X-Forwarded-* headers from Cloudflare Proxy IP ranges
      # https://www.cloudflare.com/ips/
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32

      # Swarm provider (Traefik v3)
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=public

      # Let's Encrypt via Cloudflare DNS challenge
      - --certificatesresolvers.${LETSENCRYPT_RESOLVER:-le}.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.${LETSENCRYPT_RESOLVER:-le}.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.${LETSENCRYPT_RESOLVER:-le}.acme.dnschallenge=true
      - --certificatesresolvers.${LETSENCRYPT_RESOLVER:-le}.acme.dnschallenge.provider=cloudflare

      # (Optional) dashboard on :8080, you can remove if you don't want it
      - --api.dashboard=true

      # Logs
      - --log.level=ERROR

    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    ports:
      # Use LONG SYNTAX to enable host mode: bypasses Swarm Mesh (SNAT)
      # to preserve the real Client IP in X-Forwarded-For headers.
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      # (Optional) dashboard: http://node-ip:8080
      # - "8080:8080"
    networks:
      - public
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt-data:/letsencrypt"
    deploy:
      placement:
        constraints:
          - node.role == manager

  agent:
    image: portainer/agent:lts
    environment:
      AGENT_CLUSTER_ADDR: tasks.agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent-network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux

  portainer:
    image: portainer/portainer-ce:lts
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    volumes:
      - portainer-data:/data
    networks:
      - public
      - agent-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"

        # Portainer UI
        - "traefik.http.routers.portainer.rule=Host(`${PORTAINER_HOST}`)"
        - "traefik.http.routers.portainer.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS:-websecure}"
        - "traefik.http.routers.portainer.tls=${TRAEFIK_ROUTER_TLS:-true}"
        - "traefik.http.routers.portainer.tls.certresolver=${LETSENCRYPT_RESOLVER:-le}"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        - "traefik.http.routers.portainer.service=portainer"

        # (Optional) Edge (HTTPS) - only needed when you use Portainer Edge Agents to connect remote Docker/Kubernetes hosts back to your Portainer server
        # - "traefik.http.routers.edge.rule=Host(`${PORTAINER_EDGE_HOST}`)"
        # - "traefik.http.routers.edge.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS:-websecure}"
        # - "traefik.http.routers.edge.tls=${TRAEFIK_ROUTER_TLS:-true}"
        # - "traefik.http.routers.edge.tls.certresolver=${LETSENCRYPT_RESOLVER:-le}"
        # - "traefik.http.services.edge.loadbalancer.server.port=8000"
        # - "traefik.http.routers.edge.service=edge"

networks:
  public:
    name: public
    driver: overlay
    attachable: true
  agent-network:
    driver: overlay

volumes:
  traefik-letsencrypt-data:
  portainer-data:
